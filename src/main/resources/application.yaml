spring:
  application:
    name: jwt-auth

  datasource:
    url: jdbc:h2:mem:jwt_auth
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: "temporary-secret-key-for-local-development-must-be-long-enough"
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000